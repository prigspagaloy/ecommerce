<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <title>Ecommerce Webpage</title>
</head>
<body>
    <header class="header-section"></header>
    <div id="web-content">
        <div class="ad-slider">
            <div class="ad-container">
                <img src="Img/ban-2.jpg" alt="" class="promotional-ad">
                <img src="Img/ban-3.jpg" alt="" class="promotional-ad">
                <img src="Img/ban-4.jpg" alt="" class="promotional-ad">
                <img src="Img/ban-5.jpg" alt="" class="promotional-ad">
                <img src="Img/ban-6.jpg" alt="" class="promotional-ad">
                <!-- <img src="Img/sample-ad5.png" alt="" class="promotional-ad"> -->
            </div>
        </div> 
        <div class="promotional-arrow-container">
            <div class="arrow-left">
                <i id="prev" class="fa fa-angle-left"></i>
            </div>
            <div class="arrow-right">
                <i id="next" class="fa fa-angle-right"></i>
            </div>
        </div>
        <section class="product-section">
            <div class="product-box">
                <div class="all-products-div-box">
                    <h3>ALL PRODUCTS</h3>
                    <div class="all-products-div-box-container"></div>
                    <p class="see-more">See more</p>
                </div>
                <div class="free-shipping">
                    <h3>FREE SHIPPING</h3>
                    <div class="free-shipping-img-box">
                        <img src="Img/freeshipping.jpg" alt="" class="free-shipping-img">
                    </div>
                    <p class="see-more">See more</p>
                </div>
                <div class="tech">
                    <h3>TECH ACCESSORIES</h3>
                    <div class="tech-container"></div>
                    <p class="see-more">See more</p>
                </div>
                <div class="fashion">
                    <h3>FASHION</h3>
                    <div class="fashion-container"></div>
                    <p class="see-more">See more</p>
                </div>
            </div>
            <div class="slides">
                <div class="product-slider-container">
                    <h3>SAMPLE SECTION</h3>
                    <div class="product-slider">
                        <div class="product-slider-img-container">
                            <div id="slider-img1" class="product-slider-img"></div>
                        </div>
                        <button id="prev1" class="arrow-btn-left">&#10094;</button>
                        <button id="next1" class="arrow-btn-right">&#10095;</button>
                    </div>
                </div>
            </div>
            <div class="slides">
                <div class="product-slider-container">
                    <h3>SAMPLE SECTION</h3>
                    <div class="product-slider">
                        <div class="product-slider-img-container">
                            <div id="slider-img2" class="product-slider-img"></div>
                        </div>
                        <button id="prev2" class="arrow-btn-left">&#10094;</button>
                        <button id="next2" class="arrow-btn-right">&#10095;</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <footer class="footer-section"></footer>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
